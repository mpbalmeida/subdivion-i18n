name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          server-id: central
          server-username: SONATYPE_TOKEN_USERNAME
          server-password: SONATYPE_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify commit message
        if: github.event_name == 'pull_request'
        run: |
          COMMIT="${{ github.event.pull_request.head.sha }}"
          git log -1 --pretty=format:"%s" "$COMMIT" > latest_commit_msg.txt
          ./scripts/commit-msg.sh latest_commit_msg.txt

      - name: Build and test
        run: mvn verify --batch-mode

      - name: Calculate next snapshot version
        if: github.event_name == 'pull_request'
        id: snapshot
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No tags found, using pom.xml version as base"
            LAST_TAG="v$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl library | sed 's/-SNAPSHOT//')"
            RANGE="${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${LAST_TAG}..${{ github.event.pull_request.head.sha }}"
          fi
          echo "Last tag: $LAST_TAG"

          MAJOR=0; MINOR=0; PATCH=0
          while IFS= read -r commit; do
            case "$commit" in
              *"BREAKING CHANGE"*|*feat!\(*\):*) MAJOR=$((MAJOR + 1)) ;;
              feat*)                                MINOR=$((MINOR + 1)) ;;
              fix*)                                 PATCH=$((PATCH + 1)) ;;
            esac
          done < <(git log --no-merges --pretty=tformat:"%s" $RANGE)

          echo "Counts: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH"

          PREV="${LAST_TAG#v}"
          PV_MAJOR=$(echo "$PREV" | cut -d. -f1)
          PV_MINOR=$(echo "$PREV" | cut -d. -f2)
          PV_PATCH=$(echo "$PREV" | cut -d. -f3)

          if [ "$MAJOR" -gt 0 ]; then
            NEXT="$((PV_MAJOR + MAJOR)).0.0"
          elif [ "$MINOR" -gt 0 ]; then
            NEXT="${PV_MAJOR}.$((PV_MINOR + 1)).0"
          elif [ "$PATCH" -gt 0 ]; then
            NEXT="${PV_MAJOR}.${PV_MINOR}.$((PV_PATCH + 1))"
          else
            echo "No release commits, using current version for snapshot"
            NEXT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl library | sed 's/-SNAPSHOT//')
          fi

          echo "Snapshot version: ${NEXT}-SNAPSHOT"
          echo "version=${NEXT}-SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Deploy snapshot
        if: github.event_name == 'pull_request'
        run: |
          mvn versions:set -DnewVersion="${{ steps.snapshot.outputs.version }}" -DgenerateBackupPoms=false
          mvn deploy -P deployment --batch-mode -pl library -am
        env:
          SONATYPE_TOKEN_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          SONATYPE_TOKEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          server-id: central
          server-username: SONATYPE_TOKEN_USERNAME
          server-password: SONATYPE_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify commit message
        if: github.event_name == 'pull_request'
        run: |
          COMMIT="${{ github.event.pull_request.head.sha }}"
          git log -1 --pretty=format:"%s" "$COMMIT" > latest_commit_msg.txt
          ./scripts/commit-msg.sh latest_commit_msg.txt

      - name: Build and test
        run: mvn verify --batch-mode

      - name: Deploy snapshot
        if: github.event_name == 'pull_request'
        run: |
          NEXT_VERSION=$(npx --yes -p semantic-release -p @semantic-release/exec semantic-release --dry-run 2>&1 \
            | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$NEXT_VERSION" ]; then
            echo "Could not determine next version, skipping snapshot deploy"
            exit 0
          fi
          echo "Next version: ${NEXT_VERSION}-SNAPSHOT"
          mvn versions:set -DnewVersion="${NEXT_VERSION}-SNAPSHOT" -DgenerateBackupPoms=false
          mvn deploy -P deployment --batch-mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONATYPE_TOKEN_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          SONATYPE_TOKEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

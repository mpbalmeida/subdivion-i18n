name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          server-id: central
          server-username: SONATYPE_TOKEN_USERNAME
          server-password: SONATYPE_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build and test
        run: mvn verify --batch-mode

      - name: Semantic Release
        run: |
          npm ci
          npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Central
        run: mvn deploy -P deployment --batch-mode
        env:
          SONATYPE_TOKEN_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          SONATYPE_TOKEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Bump to next SNAPSHOT
        run: |
          NEXT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAJOR=$(echo "$NEXT" | cut -d. -f1)
          MINOR=$(echo "$NEXT" | cut -d. -f2)
          NEXT_SNAPSHOT="${MAJOR}.$((MINOR + 1)).0-SNAPSHOT"

          mvn versions:set -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet pom.xml; then
            echo "pom.xml unchanged, skipping bump commit"
            exit 0
          fi

          git add pom.xml
          git commit -m "chore(release): bump to $NEXT_SNAPSHOT [skip ci]"
          git push
